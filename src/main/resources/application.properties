# MongoDB connection — update the URI to match your local or Atlas cluster
spring.data.mongodb.uri=mongodb://localhost:27017/studentdb

# Application name (shows in logs and Spring Boot admin)
spring.application.name=mongo-spring

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true

# Show the banner on startup (set to off to silence)
spring.main.banner-mode=console
